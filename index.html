<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#FF385C">
<title>Right Place — Vivibilità per quartiere</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff;--s1:#f7f8fa;--s2:#eef0f5;--s3:#e2e6ee;
  --b0:rgba(0,0,0,.07);--b1:rgba(0,0,0,.13);
  --t1:#111;--t2:rgba(17,17,17,.6);--t3:rgba(17,17,17,.38);
  --rd:#FF385C;--rdg:rgba(255,56,92,.1);
  --sh:0 2px 16px rgba(0,0,0,.09);--sh2:0 8px 32px rgba(0,0,0,.14);
  --ff:'Plus Jakarta Sans',system-ui,sans-serif;
  --bar:54px;--rp:270px;--ls:208px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  color:var(--t1);font-family:var(--ff);font-size:13px;-webkit-font-smoothing:antialiased}
#mw{position:fixed;inset:0;top:var(--bar);background:#e8edf5;cursor:grab;overflow:hidden}
#mw.drag{cursor:grabbing}
#cv{position:absolute;inset:0;display:block}
/* BAR */
#bar{position:fixed;top:0;left:0;right:0;height:var(--bar);z-index:900;
  background:rgba(255,255,255,.98);border-bottom:1px solid var(--b0);box-shadow:var(--sh);
  display:flex;align-items:center}
.brand{width:var(--ls);flex-shrink:0;display:flex;align-items:center;gap:10px;
  padding:0 16px;border-right:1px solid var(--b0)}
.brand-mark{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:800;color:#fff;letter-spacing:-.5px;
  flex-shrink:0;background:linear-gradient(135deg,#FF385C,#E31C5F);
  box-shadow:0 2px 10px rgba(255,56,92,.35)}
.brand-name{font-size:16px;font-weight:800;letter-spacing:-.6px}
.brand-tag{font-size:8px;font-weight:600;color:var(--rd);text-transform:uppercase;
  letter-spacing:.7px;display:block;margin-top:-2px}
.profs{flex:1;display:flex;align-items:center;justify-content:center;gap:4px}
.pf{padding:7px 15px;border-radius:22px;font-size:12px;font-weight:600;cursor:pointer;
  border:1.5px solid transparent;background:transparent;color:var(--t2);font-family:var(--ff);transition:all .14s}
.pf:hover:not(.on){background:var(--s2);color:var(--t1)}
.pf.on{background:var(--rdg);border-color:var(--rd);color:var(--rd)}
.lgnd{display:flex;align-items:center;gap:10px;padding:0 18px;border-left:1px solid var(--b0)}
.lgnd-lbl{font-size:7px;color:var(--t3);text-transform:uppercase;letter-spacing:.9px;font-weight:700}
.lgnd-bar{display:flex;height:7px;width:108px;border-radius:4px;overflow:hidden;gap:1px;margin:3px 0}
.lgnd-seg{flex:1}
.lgnd-ends{display:flex;justify-content:space-between;width:108px;font-size:7px;color:var(--t3)}
/* SIDEBAR */
#ls{position:fixed;top:var(--bar);left:0;width:var(--ls);bottom:0;z-index:700;
  background:rgba(255,255,255,.99);border-right:1px solid var(--b0);box-shadow:var(--sh);
  display:flex;flex-direction:column;transition:transform .2s cubic-bezier(.4,0,.2,1)}
#ls.hidden{transform:translateX(-100%)}
#lstog{position:fixed;top:50%;left:var(--ls);transform:translateY(-50%);z-index:710;
  width:14px;height:36px;background:rgba(255,255,255,.99);border:1px solid var(--b0);
  border-left:none;border-radius:0 6px 6px 0;cursor:pointer;color:var(--t3);
  font-size:8px;display:grid;place-items:center;transition:left .2s cubic-bezier(.4,0,.2,1)}
#lstog:hover{color:var(--rd)}
#ls.hidden~#lstog{left:0}
.ls-hd{padding:13px 14px 9px;border-bottom:1px solid var(--b0)}
.ls-title{font-size:12px;font-weight:700}.ls-sub{font-size:9px;color:var(--t3);margin-top:1px}
.ls-body{flex:1;overflow-y:auto;padding:8px 12px 14px;scrollbar-width:thin;scrollbar-color:var(--b0) transparent}
.ls-body::-webkit-scrollbar{width:2px}
.ls-body::-webkit-scrollbar-thumb{background:var(--b1)}
.cat-h{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.1px;
  color:var(--rd);margin:12px 0 5px 1px}
.cat-h:first-child{margin-top:4px}
.ind{margin-bottom:9px}
.ind-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.ind-name{font-size:10.5px;color:var(--t2)}
.ind-val{font-size:8.5px;font-weight:700;min-width:16px;text-align:center;
  padding:1px 5px;border-radius:4px;background:var(--s2);color:var(--t3);transition:all .1s}
.ind-val.on{background:var(--rd);color:#fff}
.ind-trk{position:relative;height:2px;background:var(--b0);border-radius:1px}
.ind-fill{position:absolute;left:0;top:0;height:100%;background:var(--rd);border-radius:1px;pointer-events:none}
input[type=range]{width:100%;height:2px;-webkit-appearance:none;background:transparent;position:relative;z-index:1;cursor:pointer;display:block}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;border:2.5px solid var(--rd);box-shadow:0 1px 4px rgba(0,0,0,.15);margin-top:-6px}
input[type=range]::-webkit-slider-runnable-track{height:2px;background:transparent}
.rst-btn{width:100%;margin-top:10px;padding:8px;font-family:var(--ff);font-size:11px;font-weight:600;background:var(--s1);border:1px solid var(--b0);border-radius:8px;color:var(--t2);cursor:pointer;transition:all .12s}
.rst-btn:hover{background:var(--rdg);color:var(--rd);border-color:var(--rd)}
/* PANNELLO DX */
#rp{position:fixed;top:var(--bar);right:0;width:var(--rp);bottom:0;z-index:700;
  background:rgba(255,255,255,.99);border-left:1px solid var(--b0);box-shadow:var(--sh);
  display:flex;flex-direction:column}
#sw{padding:11px 12px;border-bottom:1px solid var(--b0);flex-shrink:0;position:relative}
#si{width:100%;padding:9px 30px 9px 34px;background:var(--s1);border:1.5px solid var(--b1);
  border-radius:22px;font-family:var(--ff);font-size:12px;color:var(--t1);outline:none;transition:all .15s}
#si::placeholder{color:var(--t3)}
#si:focus{border-color:var(--rd);background:#fff;box-shadow:0 0 0 3px var(--rdg)}
.si-ico{position:absolute;left:24px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.35;pointer-events:none}
#si-clr{position:absolute;right:22px;top:50%;transform:translateY(-50%);display:none;width:17px;height:17px;border:none;background:var(--s3);color:var(--t2);border-radius:50%;cursor:pointer;font-size:10px;line-height:17px;text-align:center}
#dp{position:absolute;top:calc(100%+2px);left:12px;right:12px;background:#fff;border:1px solid var(--b1);border-radius:14px;box-shadow:var(--sh2);z-index:999;max-height:260px;overflow-y:auto;display:none}
#dp.open{display:block}
.dr{padding:11px 13px;cursor:pointer;border-bottom:1px solid var(--b0);display:flex;align-items:center;gap:9px;transition:background .08s}
.dr:last-child{border-bottom:none}
.dr:hover,.dr.hi{background:var(--s1)}
.dr-info{flex:1;min-width:0}
.dr-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dr-sub{font-size:9px;color:var(--t3);margin-top:1px}
.dr-s{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;flex-shrink:0}
.dr-empty{padding:16px;font-size:11px;color:var(--t3);text-align:center}
#det{flex:1;overflow-y:auto;padding:13px 14px;scrollbar-width:thin;scrollbar-color:var(--b0) transparent}
#det::-webkit-scrollbar{width:2px}
#det::-webkit-scrollbar-thumb{background:var(--b1)}
/* DETAIL */
.empty-state{display:flex;flex-direction:column;align-items:center;gap:12px;padding:30px 12px;text-align:center}
.em-ico{width:52px;height:52px;border-radius:16px;background:var(--s2);border:1px solid var(--b0);display:grid;place-items:center;font-size:24px}
.em-h{font-size:15px;font-weight:800;letter-spacing:-.3px}
.em-p{font-size:10.5px;color:var(--t3);line-height:1.75}
.em-chips{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:6px}
.chip{font-size:8px;padding:3px 9px;border-radius:20px;font-weight:600;background:var(--s2);border:1px solid var(--b0);color:var(--t2)}
.d-badge{display:inline-flex;align-items:center;gap:5px;background:var(--rdg);border:1px solid rgba(255,56,92,.2);color:var(--rd);font-size:9px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.d-name{font-size:17px;font-weight:800;letter-spacing:-.5px;line-height:1.2;margin-bottom:2px}
.d-loc{font-size:10px;color:var(--t3);margin-bottom:10px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.d-prov{background:var(--s2);border:1px solid var(--b0);border-radius:5px;padding:1px 7px;font-size:8.5px;font-weight:600;color:var(--t2)}
.score-card{background:var(--s1);border:1px solid var(--b0);border-radius:16px;padding:13px 14px;display:flex;align-items:center;gap:13px;margin-bottom:11px}
.s-ring{width:56px;height:56px;border-radius:50%;border:3px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.s-ring-n{font-size:20px;font-weight:800;line-height:1}
.s-ring-l{font-size:6px;font-weight:700;text-transform:uppercase;color:var(--t3);letter-spacing:.5px;margin-top:2px}
.s-meta h4{font-size:13px;font-weight:700;margin-bottom:2px}
.s-meta p{font-size:10px;color:var(--t3)}
.s-rank{display:inline-block;margin-top:4px;font-size:9px;color:var(--t3);background:var(--s2);border:1px solid var(--b0);padding:1px 8px;border-radius:10px}
.amenity-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:11px}
.ap{font-size:9.5px;font-weight:600;padding:4px 10px;border-radius:22px}
.ap-food{background:#fff3e0;color:#bf360c}
.ap-shop{background:#e8f5e9;color:#1b5e20}
.ap-school{background:#e3f2fd;color:#0d47a1}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:11px}
.dc{background:var(--s1);border:1px solid var(--b0);border-radius:12px;padding:9px 11px}
.dc-lbl{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--t3);margin-bottom:3px}
.dc-src{font-size:6px;opacity:.65;font-weight:400;text-transform:none;letter-spacing:0}
.dc-val{font-size:13px;font-weight:800;color:var(--t1)}
.dc-sub{font-size:9px;color:var(--t3);margin-top:1px}
.dc-up{color:#22c55e}.dc-dn{color:#ef4444}
.bars-hd{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);margin-bottom:8px}
.bar-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.bar-lbl{font-size:9.5px;color:var(--t2);width:96px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-trk{flex:1;height:3px;background:var(--b0);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.bar-num{font-size:9.5px;font-weight:700;width:22px;text-align:right;flex-shrink:0}
.src-note{margin-top:12px;padding:10px 12px;background:var(--s1);border:1px solid var(--b0);border-radius:10px}
.src-title{font-size:7.5px;font-weight:700;color:var(--rd);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.src-body{font-size:7.5px;color:var(--t3);line-height:1.8}
/* TOP5 */
#t5-wrap{border-top:1px solid var(--b0);padding:10px 14px 13px;flex-shrink:0;background:var(--s1)}
.t5-hd{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t2);margin-bottom:7px}
.t5-row{display:flex;align-items:center;gap:7px;padding:5px;cursor:pointer;border-radius:8px;transition:all .1s;border-bottom:1px solid var(--b0)}
.t5-row:last-child{border-bottom:none}
.t5-row:hover{background:var(--s2);padding-left:9px}
.t5-medal{width:18px;font-size:12px;text-align:center;flex-shrink:0}
.t5-cap{font-size:8px;font-weight:600;color:var(--t3);width:38px;flex-shrink:0}
.t5-name{flex:1;font-size:10.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t5-score{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px;flex-shrink:0}
/* CONTROLS */
#home-btn{position:fixed;left:220px;top:62px;z-index:800;background:rgba(255,255,255,.98);
  border:1px solid var(--b0);border-radius:9px;padding:7px 13px;font-family:var(--ff);
  font-size:11.5px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .13s;box-shadow:var(--sh)}
#home-btn:hover{background:var(--rdg);color:var(--rd);border-color:var(--rd)}
#zoom-ctrl{position:fixed;right:282px;top:62px;z-index:800;background:rgba(255,255,255,.98);
  border:1px solid var(--b0);border-radius:9px;overflow:hidden;box-shadow:var(--sh)}
.zb{display:block;width:34px;height:34px;border:none;background:transparent;color:var(--t2);
  font-size:20px;cursor:pointer;line-height:34px;text-align:center;font-family:var(--ff)}
.zb:hover{background:var(--s1);color:var(--rd)}
.zb-sep{height:1px;background:var(--b0)}
/* STATUS */
#status{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:800;
  background:rgba(255,255,255,.98);border:1px solid var(--b0);border-radius:22px;
  padding:5px 16px;font-size:10.5px;color:var(--t2);box-shadow:var(--sh);
  display:flex;align-items:center;gap:7px;pointer-events:none;white-space:nowrap}
#sdot{width:6px;height:6px;border-radius:50%;background:var(--rd);flex-shrink:0}
#sdot.loading{background:#f59e0b;animation:pulse 1s infinite}
#sdot.err{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* TOOLTIP */
#tip{position:absolute;display:none;pointer-events:none;z-index:50;
  background:rgba(255,255,255,.99);border:1px solid var(--b1);border-radius:16px;
  padding:14px 16px;min-width:220px;max-width:255px;box-shadow:0 10px 40px rgba(0,0,0,.15)}
.tp-cap{font-size:9px;font-weight:700;letter-spacing:.4px;color:var(--rd);margin-bottom:3px}
.tp-name{font-size:15px;font-weight:800;letter-spacing:-.4px;margin-bottom:1px}
.tp-loc{font-size:9.5px;color:var(--t3);margin-bottom:9px}
.tp-score-row{display:flex;align-items:baseline;gap:6px;margin-bottom:8px}
.tp-s{font-size:28px;font-weight:800;line-height:1}
.tp-sl{font-size:11px;color:var(--t2)}
.tp-sep{height:1px;background:var(--b0);margin:8px 0}
.tp-ams{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.tp-am{font-size:9px;font-weight:600;padding:3px 8px;border-radius:20px}
.tp-am-f{background:#fff3e0;color:#bf360c}
.tp-am-s{background:#e8f5e9;color:#1b5e20}
.tp-am-sc{background:#e3f2fd;color:#0d47a1}
.tp-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px}
.tp-cell{background:var(--s1);border-radius:8px;padding:6px 8px}
.tp-clbl{font-size:7px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;font-weight:600}
.tp-cval{font-size:12px;font-weight:700}
.tp-up{color:#16a34a}.tp-dn{color:#dc2626}
.tp-src{font-size:7px;color:var(--t3);opacity:.7}
/* LOADER */
#loader{position:fixed;inset:0;background:#fff;z-index:2000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  transition:opacity .5s}
#loader.gone{opacity:0;pointer-events:none}
.ld-ring{width:46px;height:46px;border:3px solid var(--b0);border-top-color:var(--rd);
  border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-logo{font-size:24px;font-weight:800;letter-spacing:-.6px}
.ld-logo span{color:var(--rd)}
.ld-sub{font-size:12px;color:var(--t3)}
.ld-prog{width:200px;height:3px;background:var(--b0);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:var(--rd);border-radius:2px;transition:width .3s}
/* MOBILE */
@media(max-width:767px){
  :root{--bar:52px}
  #ls,#lstog,#home-btn,#zoom-ctrl,#status{display:none!important}
  #bar{height:var(--bar)}
  .brand{width:auto;padding:0 14px;border-right:none}
  .brand-tag{display:none}
  .brand-name{font-size:15px}
  .profs{padding:0 6px;gap:3px}
  .pf{padding:5px 11px;font-size:11px}
  .lgnd{display:none}
  #mw{top:var(--bar)}
  #rp{top:auto;right:0;left:0;bottom:0;width:100%;height:64px;
    border-left:none;border-top:1.5px solid var(--b0);
    border-radius:20px 20px 0 0;box-shadow:0 -6px 24px rgba(0,0,0,.1);
    transition:height .3s cubic-bezier(.4,0,.2,1);z-index:800;overflow:hidden}
  #rp.open{height:82vh}
  #mob-handle{display:flex;flex-direction:column;align-items:center;padding:10px 16px 8px;cursor:pointer;flex-shrink:0}
  #mob-pill{width:38px;height:4px;background:var(--b1);border-radius:2px;margin-bottom:8px}
  #mob-info{display:flex;align-items:center;justify-content:space-between;width:100%}
  #mob-name{font-size:13px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:10px}
  #mob-score{font-size:14px;font-weight:800;padding:3px 11px;border-radius:20px}
  #sw{padding:0 12px 10px;border-bottom:1px solid var(--b0)}
  #det{padding:10px 14px 80px}
  #t5-wrap{padding:8px 14px 12px}
}
@media(min-width:768px){
  #mob-handle{display:none}
}
@media(max-width:1024px) and (min-width:768px){
  :root{--ls:185px;--rp:242px}
  #home-btn{left:197px}
  #zoom-ctrl{right:254px}
  .pf{padding:6px 12px;font-size:11px}
}
</style>
</head>
<body>
<div id="loader">
  <div class="ld-ring"></div>
  <div class="ld-logo">Right<span>Place</span></div>
  <div class="ld-sub" id="ld-msg">Avvio…</div>
  <div class="ld-prog"><div class="ld-fill" id="ld-bar" style="width:0%"></div></div>
</div>
<div id="mw"><canvas id="cv"></canvas><div id="tip"></div></div>
<div id="bar">
  <div class="brand">
    <div class="brand-mark">RP</div>
    <div><div class="brand-name">Right Place</div><span class="brand-tag">Vivi meglio</span></div>
  </div>
  <div class="profs">
    <button class="pf on" onclick="setProf('studente',this)">🎓 Studente</button>
    <button class="pf"    onclick="setProf('single',this)"  >💼 Single</button>
    <button class="pf"    onclick="setProf('famiglia',this)">👨‍👩‍👧 Famiglia</button>
  </div>
  <div class="lgnd">
    <div>
      <div class="lgnd-lbl">Vivibilità</div>
      <div class="lgnd-bar">
        <div class="lgnd-seg" style="background:#ef4444"></div>
        <div class="lgnd-seg" style="background:#f97316"></div>
        <div class="lgnd-seg" style="background:#eab308"></div>
        <div class="lgnd-seg" style="background:#84cc16"></div>
        <div class="lgnd-seg" style="background:#22c55e"></div>
        <div class="lgnd-seg" style="background:#16a34a"></div>
      </div>
      <div class="lgnd-ends"><span>Basso</span><span>Alto</span></div>
    </div>
  </div>
</div>
<div id="ls">
  <div class="ls-hd"><div class="ls-title">Pesi indicatori</div><div class="ls-sub">Personalizza il profilo</div></div>
  <div class="ls-body" id="ls-body"></div>
</div>
<button id="lstog" onclick="toggleLS()">‹</button>
<button id="home-btn" onclick="goHome()">🇮🇹 Italia</button>
<div id="zoom-ctrl">
  <button class="zb" onclick="zBtn(1)">+</button><div class="zb-sep"></div><button class="zb" onclick="zBtn(-1)">−</button>
</div>
<div id="rp">
  <div id="mob-handle" onclick="toggleSheet()">
    <div id="mob-pill"></div>
    <div id="mob-info"><span id="mob-name">Cerca un quartiere…</span><span id="mob-score"></span></div>
  </div>
  <div id="sw">
    <span class="si-ico">🔍</span>
    <input id="si" type="text" placeholder="Cerca quartiere, CAP, città…"

function sc15(cap,sig,lat,lng,acc){
  const b=D.base[sig],r=D.raw[sig],pg=D.geo[sig];
  if(!b||!r||!pg)return null;
  const dk=Math.sqrt((lat-pg[0])**2+(lng-pg[1])**2)*111;
  const a=Math.max(1,Math.min(6,acc||4));
  const pk=[0,100,50,20,10,5,2][a];
  const big=pk>=100,med=pk>=20,small=pk<10;
  const omi=D.omi[cap];
  let buy=omi||(()=>{const pb=r.buy;return dk<2?pb*1.55:dk<5?pb*1.30:dk<15?pb*1.08:dk<30?pb*0.85:pb*0.68;})();
  const smq=Math.max(5,Math.min(95,Math.round(100-(buy-400)/87)));
  const scv=Math.round(smq*0.55+b.rent*0.45);
  const uv=UNIV[sig]||55,tr=TRAS[sig]||55;
  const su=Math.round(uv*(big?1.0:med?0.72:small?0.44:0.60));
  const st=big?tr:med?Math.max(28,tr-18):Math.max(18,tr-32);
  const so=big?Math.min(94,b.gdp*0.7+22):med?Math.min(78,b.gdp*0.55+15):Math.min(62,b.gdp*0.4+10);
  const ss=big?88:med?72:small?40:55;
  const sc=big?Math.round(uv*0.82):med?58:45;
  let sec=b.sec;
  if(big&&dk<3)sec=Math.max(5,sec-22);else if(big&&dk<10)sec=Math.max(5,sec-13);else if(small)sec=Math.min(95,sec+13);
  const gdp=Math.min(95,Math.max(5,b.gdp+(big?6:small?-8:0)));
  const emp=Math.min(95,Math.max(5,b.emp+(big?4:small?-5:0)));
  let air=ARIA[sig]||55;if(big&&dk<5)air=Math.max(5,air-16);else if(big)air=Math.max(8,air-8);
  const istr=Math.round(b.gdp*0.45+(uv)*0.55);
  const reg=D.reg[sig];
  const z=['Piemonte','Lombardia','Veneto','Trentino-AA','Friuli-VG','Liguria','Emilia-Romagna',"Valle d'Aosta"].includes(reg)?'N':['Toscana','Umbria','Marche','Lazio'].includes(reg)?'C':['Sicilia','Sardegna'].includes(reg)?'I':'S';
  const cr={MI:82,BO:78,PD:75,TN:74,BZ:74,VR:73,BS:70,BG:70,RM:68,FI:65,GE:62,TO:65,VE:68,RE:75,MO:73,PR:70,BA:55,PA:45,NA:42,RC:36,KR:33,VV:33}[sig]||{N:65,C:52,S:38,I:42}[z];
  const cv=v=>Math.max(5,Math.min(95,Math.round(v)));
  return[cv(su),cv(st),cv(so),cv(ss),cv(sc),cv(scv),cv(gdp),cv(smq),cv(emp),cv(air),cv(CLIM[sig]||55),cv(sec),cv(TURI[sig]||60),cv(istr),cv(cr)];
}

function mkCAP(cap,nome,prov,reg,sig,lat,lng,acc){
  const s=sc15(cap,sig,lat,lng,acc);if(!s)return null;
  const r=D.raw[sig];
  return{cap,nome,prov,reg,sig,lat,lng,sc15:s,buy:D.omi[cap]||r.buy,crime:r.crime,emp:r.emp,gdp:r.gdp};
}

// ── BOOT IMMEDIATO — nessuna rete, <1s ──
function boot(){
  setLoad('Avvio…',20);
  // Province (108 punti)
  CAPS=[];
  for(const[sig,geo]of Object.entries(D.geo)){
    const r=D.raw[sig];if(!r)continue;
    const c=mkCAP(sig,D.nome[sig],D.nome[sig],D.reg[sig],sig,geo[0],geo[1],1);
    if(c)CAPS.push(c);
  }
  // Quartieri grandi città (220 punti embedded)
  for(const[cap,coords]of Object.entries(D.city_caps)){
    const sig=c2p(cap);if(!sig||!D.raw[sig])continue;
    const c=mkCAP(cap,D.city_names[cap]||cap,D.nome[sig],D.reg[sig],sig,coords[0],coords[1],1);
    if(c)CAPS.push(c);
  }
  finish();
  // Poi arricchisci in background (non blocca mai la UI)
  setTimeout(()=>enrichBg().catch(()=>{}),100);
}

function finish(){
  N=CAPS.length;XN=new Float32Array(N);YN=new Float32Array(N);
  for(let i=0;i<N;i++){const sin=Math.sin(CAPS[i].lat*Math.PI/180);XN[i]=(CAPS[i].lng+180)/360;YN[i]=(1-Math.log((1+sin)/(1-sin))/(2*Math.PI))/2;}
  rebuildScores();buildSidebar();resetDet();buildTop5();resize();sched();
  setLoad('',100);
  setTimeout(()=>{document.getElementById('loader').classList.add('gone');
    setTimeout(()=>document.getElementById('loader').style.display='none',500);},200);
  setStatus('ok',`✅ ${N.toLocaleString('it')} zone caricate`);
}

// ── ARRICCHIMENTO BACKGROUND ──
const CK='rp_gn_v3',CT=7*24*3600*1000;
function fetchT(url,ms){const c=new AbortController();setTimeout(()=>c.abort(),ms);return fetch(url,{signal:c.signal,cache:'force-cache'});}
async function enrichBg(){
  let tsv=null;
  try{const r=JSON.parse(localStorage.getItem(CK)||'null');if(r&&Date.now()-r.t<CT)tsv=r.d;}catch(e){}
  if(!tsv){
    // Carica pako con timeout 8s
    await new Promise((res,rej)=>{
      if(window.pako){res();return;}
      const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js';
      const tid=setTimeout(rej,8000);s.onload=()=>{clearTimeout(tid);res();};s.onerror=()=>{clearTimeout(tid);rej();};
      document.head.appendChild(s);
    });
    for(const url of['https://download.geonames.org/export/zip/IT.zip','https://api.allorigins.win/raw?url='+encodeURIComponent('https://download.geonames.org/export/zip/IT.zip'),'https://corsproxy.io/?'+encodeURIComponent('https://download.geonames.org/export/zip/IT.zip')]){
      try{
        const r=await fetchT(url,12000);if(!r.ok)continue;
        const buf=await r.arrayBuffer();const b=new Uint8Array(buf);
        let p=0;while(p<b.length-30&&!(b[p]===0x50&&b[p+1]===0x4B&&b[p+2]===0x03&&b[p+3]===0x04))p++;
        if(p>=b.length-30)continue;
        const fl=b[p+26]|(b[p+27]<<8),el=b[p+28]|(b[p+29]<<8);
        const cs=(b[p+18]|(b[p+19]<<8)|(b[p+20]<<16)|(b[p+21]<<24))>>>0;
        const mt=b[p+8]|(b[p+9]<<8),d=b.slice(p+30+fl+el,p+30+fl+el+cs);
        const dc=mt===8?pako.inflateRaw(d):d;
        tsv=new TextDecoder().decode(dc);
        if(tsv.length>10000){try{localStorage.setItem(CK,JSON.stringify({t:Date.now(),d:tsv}));}catch(e){}break;}
      }catch(e){continue;}
    }
  }
  if(!tsv||tsv.length<1000)return;
  setStatus('loading','Aggiornamento coordinate…');
  const gm=new Map();
  for(const ln of tsv.split('
')){
    if(!ln)continue;const p=ln.split('	');if(p.length<11)continue;
    const cap=p[1].trim().padStart(5,'0');
    const lat=parseFloat(p[9]),lng=parseFloat(p[10]);
    if(isNaN(lat)||isNaN(lng)||lat<35||lat>48||lng<6||lng>19)continue;
    if(!gm.has(cap))gm.set(cap,{lat,lng,nome:p[2].trim(),reg:p[3].trim(),prov:p[5].trim(),acc:parseInt(p[11])||4});
  }
  for(const[cap,coords]of Object.entries(D.city_caps)){
    const ex=gm.get(cap);gm.set(cap,{lat:coords[0],lng:coords[1],nome:D.city_names[cap]||cap,reg:ex?.reg||'',prov:ex?.prov||'',acc:1});
  }
  const nc=[];
  for(const[cap,geo]of gm){
    const sig=c2p(cap);if(!sig||!D.raw[sig])continue;
    const c=mkCAP(cap,geo.nome,geo.prov||D.nome[sig],geo.reg||D.reg[sig],sig,geo.lat,geo.lng,geo.acc);
    if(c)nc.push(c);
  }
  if(nc.length>N){
    CAPS=nc;N=nc.length;XN=new Float32Array(N);YN=new Float32Array(N);
    for(let i=0;i<N;i++){const sin=Math.sin(CAPS[i].lat*Math.PI/180);XN[i]=(CAPS[i].lng+180)/360;YN[i]=(1-Math.log((1+sin)/(1-sin))/(2*Math.PI))/2;}
    rebuildScores();buildTop5();sched();
    setStatus('ok',`✅ ${N.toLocaleString('it')} quartieri e comuni`);
  }
}

const TS=256;
const mwEl=document.getElementById('mw'),cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let zoom=6,cxn=(12.5+180)/360;
let cyn=(()=>{const s=Math.sin(42.2*Math.PI/180);return(1-Math.log((1+s)/(1-s))/(2*Math.PI))/2})();
const TC=new Map();
function tile(tx,ty,z){const k=`${z}/${tx}/${ty}`;const v=TC.get(k);if(v)return v==='e'?null:v;TC.set(k,'l');const img=new Image();img.crossOrigin='';img.src=`https://${'abc'[(tx+ty+z)%3]}.tile.openstreetmap.org/${z}/${tx}/${ty}.png`;img.onload=()=>{TC.set(k,img);sched();};img.onerror=()=>TC.set(k,'e');return null;}
let raf=0;function sched(){if(!raf)raf=requestAnimationFrame(draw);}

function draw(){
  raf=0;const W=cv.width,H=cv.height;if(!W||!H)return;
  const sc=TS*Math.pow(2,zoom),nT=Math.pow(2,zoom),xp=cxn*sc-W/2,yp=cyn*sc-H/2;
  ctx.fillStyle='#e8edf5';ctx.fillRect(0,0,W,H);
  const tx0=Math.floor(xp/TS),tx1=Math.ceil((xp+W)/TS),ty0=Math.floor(yp/TS),ty1=Math.ceil((yp+H)/TS);
  for(let ty=ty0;ty<=ty1;ty++){if(ty<0||ty>=nT)continue;for(let tx=tx0;tx<=tx1;tx++){const img=tile(((tx%nT)+nT)%nT,ty,zoom);if(img)ctx.drawImage(img,Math.round(tx*TS-xp),Math.round(ty*TS-yp),TS,TS);}}
  if(!N||!SC_ARR)return;
  const r=zoom<=5?14:zoom<=6?12:zoom<=7?10:zoom<=8?9:zoom<=9?8:zoom<=10?8:zoom<=11?9:10;
  const op=zoom<=6?.55:zoom<=7?.65:zoom<=8?.75:zoom<=9?.82:zoom<=10?.88:.94;
  const mg=(r+5)/sc,vx0=cxn-W/(2*sc)-mg,vx1=cxn+W/(2*sc)+mg,vy0=cyn-H/(2*sc)-mg,vy1=cyn+H/(2*sc)+mg;
  const B=Array.from({length:NBUCK},()=>[]);
  for(let i=0;i<N;i++){if(XN[i]<vx0||XN[i]>vx1||YN[i]<vy0||YN[i]>vy1)continue;B[Math.min(NBUCK-1,SC_ARR[i]*(NBUCK/(100+1e-9))|0)].push(i);}
  ctx.globalAlpha=op*.65;ctx.strokeStyle='rgba(255,255,255,.9)';ctx.lineWidth=r*.5+1;ctx.beginPath();
  for(let b=0;b<NBUCK;b++)for(const i of B[b]){const px=(XN[i]-cxn)*sc+W/2,py=(YN[i]-cyn)*sc+H/2;ctx.moveTo(px+r+1,py);ctx.arc(px,py,r+1,0,6.2832);}
  ctx.stroke();ctx.globalAlpha=1;
  ctx.globalAlpha=op;
  for(let b=0;b<NBUCK;b++){if(!B[b].length)continue;ctx.fillStyle=BCOLS[b];ctx.beginPath();for(const i of B[b]){const px=(XN[i]-cxn)*sc+W/2,py=(YN[i]-cyn)*sc+H/2;ctx.moveTo(px+r,py);ctx.arc(px,py,r,0,6.2832);}ctx.fill();}
  ctx.globalAlpha=1;
  if(zoom>=13){ctx.font=`bold ${Math.min(10,r-1)}px Plus Jakarta Sans,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    for(let b=0;b<NBUCK;b++)for(const i of B[b]){const px=(XN[i]-cxn)*sc+W/2,py=(YN[i]-cyn)*sc+H/2;ctx.fillStyle='rgba(255,255,255,.95)';ctx.fillText(Math.round(SC_ARR[i]),px,py);}}
  if(selIdx>=0&&XN[selIdx]>=vx0&&XN[selIdx]<=vx1){const px=(XN[selIdx]-cxn)*sc+W/2,py=(YN[selIdx]-cyn)*sc+H/2,col=sCol(SC_ARR[selIdx]);ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.beginPath();ctx.arc(px,py,r+2,0,6.2832);ctx.stroke();ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(px,py,r+6,0,6.2832);ctx.stroke();ctx.globalAlpha=.28;ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.setLineDash([3,3]);ctx.beginPath();ctx.arc(px,py,r+12,0,6.2832);ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;}
  if(hovIdx>=0&&hovIdx!==selIdx&&XN[hovIdx]>=vx0){const px=(XN[hovIdx]-cxn)*sc+W/2,py=(YN[hovIdx]-cyn)*sc+H/2;ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(px,py,r+2,0,6.2832);ctx.stroke();}
  document.getElementById('stxt').textContent=`Zoom ${zoom} · ${N.toLocaleString('it')} CAP`;
}

  tipEl.style.display='block';moveTip(mx,my);
}
function moveTip(mx,my){const W2=mwEl.clientWidth;let x=mx+16;if(x+260>W2)x=mx-272;let y=my-65;if(y<4)y=my+22;tipEl.style.left=x+'px';tipEl.style.top=y+'px';}
function hideTip(){tipEl.style.display='none';lastTip=-1;}

let drag=null,moved=false;
mwEl.addEventListener('mousedown',e=>{drag={x:e.clientX,y:e.clientY,cxn,cyn,sc:TS*Math.pow(2,zoom)};moved=false;mwEl.classList.add('drag');});
window.addEventListener('mousemove',e=>{
  if(drag){if(Math.abs(e.clientX-drag.x)>3||Math.abs(e.clientY-drag.y)>3)moved=true;cxn=drag.cxn-(e.clientX-drag.x)/drag.sc;cyn=drag.cyn-(e.clientY-drag.y)/drag.sc;sched();hideTip();return;}
  const R=mwEl.getBoundingClientRect(),mx=e.clientX-R.left,my=e.clientY-R.top,h=hitTest(mx,my);
  if(h>=0){showTip(h,mx,my);if(h!==hovIdx){hovIdx=h;sched();}mwEl.style.cursor='pointer';}
  else{hideTip();if(hovIdx>=0){hovIdx=-1;sched();}mwEl.style.cursor='grab';}
});
window.addEventListener('mouseup',e=>{if(!drag)return;mwEl.classList.remove('drag');if(!moved){const R=mwEl.getBoundingClientRect(),h=hitTest(e.clientX-R.left,e.clientY-R.top);if(h>=0){pick(h);hideTip();}}drag=null;});
mwEl.addEventListener('mouseleave',()=>{hideTip();if(hovIdx>=0){hovIdx=-1;sched();}drag=null;mwEl.classList.remove('drag');});
mwEl.addEventListener('wheel',e=>{e.preventDefault();const R=mwEl.getBoundingClientRect();doZoom(e.deltaY<0?1:-1,e.clientX-R.left,e.clientY-R.top);},{passive:false});
let tc=null;
mwEl.addEventListener('touchstart',e=>{if(e.touches.length!==1)return;const t=e.touches[0];tc={x:t.clientX,y:t.clientY,cxn,cyn,sc:TS*Math.pow(2,zoom),mv:false};},{passive:true});
mwEl.addEventListener('touchmove',e=>{if(!tc||e.touches.length!==1)return;e.preventDefault();const t=e.touches[0],dx=t.clientX-tc.x,dy=t.clientY-tc.y;if(Math.abs(dx)>4||Math.abs(dy)>4)tc.mv=true;cxn=tc.cxn-dx/tc.sc;cyn=tc.cyn-dy/tc.sc;sched();},{passive:false});
mwEl.addEventListener('touchend',e=>{if(!tc)return;if(!tc.mv){const R=mwEl.getBoundingClientRect(),t=e.changedTouches[0],h=hitTest(t.clientX-R.left,t.clientY-R.top);if(h>=0){pick(h);if(!sheetOpen)toggleSheet();}}tc=null;});
function doZoom(dir,px,py){const nz=Math.max(5,Math.min(17,zoom+dir));if(nz===zoom)return;const sc=TS*Math.pow(2,zoom),wx=cxn+(px-cv.width/2)/sc,wy=cyn+(py-cv.height/2)/sc;zoom=nz;const ns=TS*Math.pow(2,nz);cxn=wx-(px-cv.width/2)/ns;cyn=wy-(py-cv.height/2)/ns;sched();}
function zBtn(d){doZoom(d,cv.width/2,cv.height/2);}
let flyR=0;
function flyTo(lat,lng,tz){if(flyR)cancelAnimationFrame(flyR);const x0=cxn,y0=cyn,z0=zoom;const sin=Math.sin(lat*Math.PI/180),x1=(lng+180)/360,y1=(1-Math.log((1+sin)/(1-sin))/(2*Math.PI))/2;const t0=performance.now();function step(now){const t=Math.min(1,(now-t0)/460),e=t<.5?2*t*t:1-2*(1-t)**2;cxn=x0+(x1-x0)*e;cyn=y0+(y1-y0)*e;zoom=Math.round(z0+(tz-z0)*e);sched();if(t<1)flyR=requestAnimationFrame(step);else{zoom=tz;cxn=x1;cyn=y1;sched();}}flyR=requestAnimationFrame(step);}
function goHome(){selIdx=-1;flyTo(42.2,12.5,6);resetDet();buildTop5();}
function resize(){cv.width=mwEl.clientWidth;cv.height=mwEl.clientHeight;sched();}
window.addEventListener('resize',resize);

const isMob=()=>window.innerWidth<=767;
function toggleSheet(f){sheetOpen=f!==undefined?f:!sheetOpen;document.getElementById('rp').classList.toggle('open',sheetOpen);}
function updHandle(nome,s,col){if(!isMob())return;const mn=document.getElementById('mob-name'),ms=document.getElementById('mob-score');if(mn)mn.textContent=nome||'Cerca un quartiere…';if(ms){ms.textContent=s?s+'/100':'';ms.style.background=col?col+'22':'';ms.style.color=col||'';}}
mwEl.addEventListener('touchend',()=>{if(isMob()&&sheetOpen)toggleSheet(false);},{passive:true});

function pick(i,fly){selIdx=i;if(fly)flyTo(CAPS[i].lat,CAPS[i].lng,Math.max(zoom,13));showDet(i);sched();buildTop5();const s=Math.round(SC_ARR[i]);updHandle(CAPS[i].nome,s,sCol(s));}

function buildSidebar(){let h='';['A','E','Q','P'].forEach(cat=>{h+=`<div class="cat-h">${CATS[cat]}</div>`;IND.filter(x=>x.c===cat).forEach(x=>{const w=W[x.id];h+=`<div class="ind"><div class="ind-top"><span class="ind-name">${x.e} ${x.n}</span><span class="ind-val${w>0?' on':''}" id="iv_${x.id}">${w}</span></div><div class="ind-trk"><div class="ind-fill" id="if_${x.id}" style="width:${w*10}%"></div><input type="range" min="0" max="10" value="${w}" oninput="upW('${x.id}',+this.value)"></div></div>`;});});h+=`<button class="rst-btn" onclick="resetW()">↺ Ripristina</button>`;document.getElementById('ls-body').innerHTML=h;}
let wt=null;
function upW(id,v){W[id]=v;document.getElementById('iv_'+id).textContent=v;document.getElementById('iv_'+id).className='ind-val'+(v>0?' on':'');document.getElementById('if_'+id).style.width=(v*10)+'%';clearTimeout(wt);wt=setTimeout(()=>{rebuildScores();sched();buildTop5();if(selIdx>=0)showDet(selIdx);},40);}
function resetW(){W={...PROFS[prof]};buildSidebar();rebuildScores();sched();buildTop5();}
function setProf(p,btn){prof=p;W={...PROFS[p]};document.querySelectorAll('.pf').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.getElementById('t5-prof').textContent={studente:'Studente',single:'Single',famiglia:'Famiglia'}[p];buildSidebar();rebuildScores();sched();buildTop5();if(selIdx>=0)showDet(selIdx);}
function toggleLS(){lsOpen=!lsOpen;document.getElementById('ls').classList.toggle('hidden',!lsOpen);document.getElementById('lstog').textContent=lsOpen?'‹':'›';document.getElementById('home-btn').style.left=lsOpen?'220px':'12px';}

function resetDet(){updHandle('','',null);document.getElementById('det').innerHTML=`<div class="empty-state"><div class="em-ico">🗺️</div><div class="em-h">Esplora l'Italia</div><p class="em-p">Clicca un quartiere sulla mappa<br>per vedere i dati reali.</p><div class="em-chips"><span class="chip">OMI 2023</span><span class="chip">ISTAT 2023</span><span class="chip">Min.Interno 2024</span><span class="chip">GeoNames CC BY</span></div></div>`;}

function showDet(i){
  const c=CAPS[i],s=Math.round(SC_ARR[i]),col=sCol(s),lbl=sLbl(s);
  const pn={studente:'Studente 🎓',single:'Single 💼',famiglia:'Famiglia 👨‍👩‍👧'}[prof];
  let rank=1;for(let j=0;j<N;j++)if(SC_ARR[j]>s)rank++;
  const am=amenities(c);
  const bars=IND.map(x=>({...x,v:c.sc15[KEYS.indexOf(x.id)],w:W[x.id]||0})).sort((a,b)=>(b.w*b.v)-(a.w*a.v)).slice(0,8).map(x=>{const bc=sCol(x.v);return`<div class="bar-row"><span class="bar-lbl">${x.e} ${x.n}</span><div class="bar-trk"><div class="bar-fill" style="width:${x.v}%;background:${bc}"></div></div><span class="bar-num" style="color:${bc}">${x.v}</span></div>`;}).join('');
  document.getElementById('det').innerHTML=`
    <div class="d-badge">📍 CAP ${c.cap}</div>
    <div class="d-name">${c.nome}</div>
    <div class="d-loc"><span class="d-prov">${c.sig}</span> ${c.prov||''}${c.reg&&c.reg!==c.prov?' · '+c.reg:''}</div>
    <div class="score-card">
      <div class="s-ring" style="border-color:${col};color:${col}"><div class="s-ring-n">${s}</div><div class="s-ring-l">score</div></div>
      <div class="s-meta"><h4 style="color:${col}">${lbl}</h4><p>${pn}</p><span class="s-rank">#${rank.toLocaleString('it')} di ${N.toLocaleString('it')}</span></div>
    </div>
    <div class="amenity-row">
      <span class="ap ap-food">🍽 ${am.food} ristoranti/bar</span>
      <span class="ap ap-shop">🛒 ${am.shop} supermercati</span>
      <span class="ap ap-school">🎒 ${am.sch} scuole</span>
    </div>
    <div class="dgrid">
      <div class="dc"><div class="dc-lbl">Acquisto /m² <span class="dc-src">OMI 2023</span></div><div class="dc-val">€ ${(c.buy||0).toLocaleString('it')}</div><div class="dc-sub">Residenziale</div></div>
      <div class="dc"><div class="dc-lbl">Crescita 5 anni <span class="dc-src">Nomisma</span></div><div class="dc-val">${gStrDet(c.sig)}</div><div class="dc-sub">2019–2024</div></div>
      <div class="dc"><div class="dc-lbl">Connettività TPL</div><div class="dc-val">${connLabel(c.sc15[1])}</div><div class="dc-sub">${connDetail(c.sc15[1])}</div></div>
      <div class="dc"><div class="dc-lbl">Occupazione <span class="dc-src">ISTAT 2023</span></div><div class="dc-val">${c.emp}%</div><div class="dc-sub">20–64 anni</div></div>
      <div class="dc"><div class="dc-lbl">Reati/100k <span class="dc-src">Min.Int</span></div><div class="dc-val">${(c.crime||0).toLocaleString('it')}</div><div class="dc-sub">Prov. ${c.sig}</div></div>
      <div class="dc"><div class="dc-lbl">Provincia</div><div class="dc-val">${D.nome[c.sig]||c.prov}</div><div class="dc-sub">${D.reg[c.sig]||c.reg}</div></div>
    </div>
    <div class="bars-hd">Top indicatori — ${pn}</div>${bars}
    <div class="src-note"><div class="src-title">📊 Fonti</div><div class="src-body">Coord: GeoNames CC BY 3.0 · Immobiliare: OMI 2023<br>Lavoro/PIL: ISTAT 2022-23 · Criminalità: Min.Interno 2024<br>Crescita: Nomisma/OMI 2024 · Scuole: INVALSI 2023</div></div>`;
}

function doSearch(v){document.getElementById('si-clr').style.display=v?'block':'none';if(!v.trim()){hideDrop();return;}const q=v.toLowerCase();srchRes=[];for(let i=0;i<N&&srchRes.length<14;i++){const c=CAPS[i];if(c.cap.startsWith(q)||c.nome.toLowerCase().includes(q)||c.prov.toLowerCase().includes(q)||c.sig.toLowerCase()===q||(D.nome[c.sig]||'').toLowerCase().includes(q))srchRes.push({i,s:Math.round(SC_ARR[i])});}srchRes.sort((a,b)=>b.s-a.s);srchHi=-1;renderDrop();}
function renderDrop(){const dp=document.getElementById('dp');if(!srchRes.length){dp.innerHTML='<div class="dr-empty">Nessun risultato</div>';dp.classList.add('open');return;}dp.innerHTML=srchRes.map(({i,s},ri)=>{const c=CAPS[i],col=sCol(s);return`<div class="dr${ri===srchHi?' hi':''}" onmousedown="pickSrch(${ri})"><div class="dr-info"><div class="dr-name">${c.nome}</div><div class="dr-sub">${c.prov} · CAP ${c.cap}</div></div><span class="dr-s" style="background:${col}22;color:${col}">${s}</span></div>`;}).join('');dp.classList.add('open');}
function hideDrop(){document.getElementById('dp').classList.remove('open');}
function pickSrch(ri){const it=srchRes[ri];if(!it)return;document.getElementById('si').value=CAPS[it.i].nome;document.getElementById('si-clr').style.display='block';hideDrop();pick(it.i,true);}
function searchKey(e){if(!document.getElementById('dp').classList.contains('open'))return;if(e.key==='ArrowDown'){e.preventDefault();srchHi=Math.min(srchHi+1,srchRes.length-1);renderDrop();}else if(e.key==='ArrowUp'){e.preventDefault();srchHi=Math.max(srchHi-1,0);renderDrop();}else if(e.key==='Enter'){if(srchHi>=0)pickSrch(srchHi);else if(srchRes.length)pickSrch(0);}else if(e.key==='Escape')hideDrop();}
function clearSearch(){document.getElementById('si').value='';document.getElementById('si-clr').style.display='none';hideDrop();srchRes=[];}
function buildTop5(){if(!N||!SC_ARR)return;const top=[];for(let i=0;i<N;i++){const s=SC_ARR[i];if(top.length<5){top.push({i,s});top.sort((a,b)=>b.s-a.s);}else if(s>top[4].s){top[4]={i,s};top.sort((a,b)=>b.s-a.s);}}document.getElementById('t5-list').innerHTML=top.map(({i,s},ri)=>{const c=CAPS[i],col=sCol(s);return`<div class="t5-row" onclick="pick(${i},true)"><span class="t5-medal">${['🥇','🥈','🥉','4°','5°'][ri]}</span><span class="t5-cap">${c.cap}</span><span class="t5-name">${c.nome}</span><span class="t5-score" style="background:${col}1a;color:${col}">${Math.round(s)}</span></div>`;}).join('');}

function setStatus(type,txt){const d=document.getElementById('sdot');d.className=type==='loading'?'loading':type==='err'?'err':'';document.getElementById('stxt').textContent=txt;}
function setLoad(msg,pct){if(msg)document.getElementById('ld-msg').textContent=msg;document.getElementById('ld-bar').style.width=pct+'%';}

// BOOT — sempre immediato
boot();
</script>
</body>
</html>
